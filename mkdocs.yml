site_name: KitchenBench
site_description: >-
  A bimanual kitchen-manipulation benchmark for VLA models, built on
  Inspect Robots.
site_url: https://robocurve.github.io/kitchenbench/
repo_url: https://github.com/robocurve/kitchenbench
repo_name: robocurve/kitchenbench
edit_uri: edit/main/docs/
copyright: Copyright &copy; KitchenBench contributors

theme:
  name: material
  icon:
    logo: material/silverware-fork-knife
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences

plugins:
  - search

nav:
  - Home: index.md
